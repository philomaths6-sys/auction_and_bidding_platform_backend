version: '3.8'

services:
  # Frontend service
  frontend:
    build:
      context: ./auction_and_bid_frontend
      dockerfile: Dockerfile
    container_name: auction_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - auction_network

  # Backend service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auction_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://auction_user:auction_password@mysql:3306/auction_db
      - DATABASE_URL_SYNC=mysql+pymysql://auction_user:auction_password@mysql:3306/auction_db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-super-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - ENVIRONMENT=production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic.ini:/app/alembic.ini
      - ./migration:/app/migration
    networks:
      - auction_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL database
  mysql:
    image: mysql:8.0
    container_name: auction_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=auction_db
      - MYSQL_USER=auction_user
      - MYSQL_PASSWORD=auction_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "auction_user", "-pauction_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - auction_network

  # Redis cache and lock service
  redis:
    image: redis:7.0-alpine
    container_name: auction_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - auction_network

  # Nginx reverse proxy (optional - for production)
  nginx:
    image: nginx:alpine
    container_name: auction_nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - auction_network
    profiles:
      - production

# Shared Docker network
networks:
  auction_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Named volumes
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
